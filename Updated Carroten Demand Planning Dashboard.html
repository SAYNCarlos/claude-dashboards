
<style>
*{box-sizing:border-box;margin:0;padding:0;}
.dash{padding:1rem 0;}
.filter-row{display:flex;gap:16px;align-items:flex-start;margin-bottom:1.25rem;flex-wrap:wrap;}
.filter-group{display:flex;flex-direction:column;gap:5px;}
.filter-label{font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--color-text-tertiary);}
.tabs{display:flex;flex-wrap:wrap;gap:5px;}
.tab{padding:4px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);font-size:12px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);transition:all 0.1s;}
.tab:hover:not(.active){background:var(--color-background-secondary);}
.tab.active.prod{background:#185FA5;color:#E6F1FB;border-color:#185FA5;font-weight:500;}
.tab.active.ch{background:#3B6D11;color:#EAF3DE;border-color:#3B6D11;font-weight:500;}
.section-label{font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin:1.25rem 0 0.6rem;}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.25rem;}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:0.75rem 1rem;}
.metric-label{font-size:11px;color:var(--color-text-tertiary);margin-bottom:4px;}
.metric-value{font-size:22px;font-weight:500;}
.metric-value.danger{color:#A32D2D;}
.metric-value.warn{color:#854F0B;}
.metric-value.ok{color:#3B6D11;}
.metric-sub{font-size:11px;color:var(--color-text-tertiary);margin-top:2px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:1.25rem;}
.mb{margin-bottom:1.25rem;}
.chart-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;}
.chart-card.auto-h{padding-bottom:1.25rem;}
.chart-title{font-size:13px;font-weight:500;color:var(--color-text-secondary);margin-bottom:10px;}
.chart-note{font-size:10px;color:var(--color-text-tertiary);margin:-6px 0 8px;}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;font-size:11px;color:var(--color-text-secondary);}
.legend span{display:flex;align-items:center;gap:4px;}
.ld{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
.pacing-grid{display:grid;gap:5px;align-items:end;}
.pacing-item{text-align:center;}
.pacing-label{font-size:10px;color:var(--color-text-tertiary);margin-bottom:3px;line-height:1.2;min-height:22px;display:flex;align-items:flex-end;justify-content:center;}
.pacing-label.all-label{color:var(--color-text-primary);font-weight:600;}
.pacing-bar-wrap{height:52px;display:flex;flex-direction:column;justify-content:flex-end;}
.pacing-bar{border-radius:3px 3px 0 0;}
.pacing-val{font-size:11px;font-weight:500;margin-top:3px;}
.pacing-divider{width:1px;background:var(--color-border-secondary);align-self:stretch;margin:22px 3px 0;}
.matrix-wrap{overflow-x:auto;}
.matrix{border-collapse:collapse;width:100%;font-size:11px;}
.matrix th{font-size:10px;color:var(--color-text-tertiary);font-weight:500;text-align:center;padding:4px 8px;white-space:nowrap;border-bottom:1px solid var(--color-border-tertiary);}
.matrix th.row-head{text-align:left;min-width:90px;}
.matrix td{padding:3px 8px;text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums;}
.matrix td.row-label{text-align:left;color:var(--color-text-secondary);font-size:10px;padding-right:10px;}
.row-start td{font-weight:600;border-top:1px solid var(--color-border-tertiary);}
.row-inbound td{color:#3B6D11;}
.row-outbound td{color:#A32D2D;}
.row-divider td{border-bottom:1px solid var(--color-border-tertiary);padding-bottom:4px;}
.row-end td{font-weight:700;padding-top:4px;}
.cell-danger{color:#A32D2D !important;}
.cell-warn{color:#854F0B !important;}
.cell-ok{color:#3B6D11 !important;}
.po-matrix th{text-align:left;}
.po-matrix td{text-align:left;padding:4px 10px;}
.po-matrix tr:not(:last-child) td{border-bottom:0.5px solid var(--color-border-tertiary);}
.po-type-in{color:#3B6D11;font-weight:500;}
.po-type-out{color:#A32D2D;font-weight:500;}
.po-none{font-size:11px;color:var(--color-text-tertiary);padding:8px 10px;}
@media(max-width:600px){.two-col{grid-template-columns:1fr;}}
</style>

const CH_COLORS={Target:'#185FA5',Amazon:'#0C447C',TikTok:'#BA7517',TikTokSamples:'#EF9F27',Walmart:'#0F6E56',Ulta:'#D4537E'};
const PACING_LABELS={Target:'Target',Amazon:'Amazon',TikTokSales:'TikTok Sales',TikTokSamples:'TikTok Samples',Walmart:'Walmart',Ulta:'Ulta'};
const CH_TREND_KEY={target:'Target',amazon:'Amazon',tiktok_s:'TikTok',tiktok_sp:'TikTokSamples',walmart:'Walmart',ulta:'Ulta'};

let activeProd='Intensive Mini', activeCh='target';
let svfChart=null, trendChart=null;

function fmt(n){const a=Math.abs(n);return(n<0?'-':'')+(a>=1000?(Math.round(a/100)/10)+'k':Math.round(a).toLocaleString());}
// ── FIX: allow negative values; only colour-code, never suppress ────────────
function ohClass(v){if(v<0)return 'cell-danger';if(v<5000)return 'cell-warn';return 'cell-ok';}
function pacingColor(v){if(v===0)return '#888780';if(v<0.5)return '#A32D2D';if(v<0.75)return '#854F0B';return '#3B6D11';}
function getCh(){return D.channels.find(c=>c.key===activeCh);}

function buildTabs(){
  document.getElementById('prod-tabs').innerHTML=D.products.map(p=>`<div class="tab prod${p===activeProd?' active':''}" onclick="selProd('${p}')">${p}</div>`).join('');
  document.getElementById('ch-tabs').innerHTML=D.channels.map(c=>`<div class="tab ch${c.key===activeCh?' active':''}" onclick="selCh('${c.key}')">${c.label}</div>`).join('');
}

function buildMetrics(){
  const ch=getCh();
  const oh=D.oh_apr28[activeProd][ch.ohCol]||0;
  const p=D.pacing[activeProd]||{};
  const pv=ch.pacingKeys.map(k=>p[k]||0).filter(v=>v>0&&v<=2);
  const avgP=pv.length?pv.reduce((a,b)=>a+b)/pv.length:0;
  const ohC=oh<0?'danger':oh<5000?'warn':'ok';
  const t=D.trend[activeProd];
  const tkey=CH_TREND_KEY[activeCh];
  const lastWk=t[t.length-1];
  const mom=lastWk[tkey+'_mom'];
  const momCol=mom===null?'':mom<0?'danger':'ok';
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-label">${ch.ohCol} (Apr 28)</div><div class="metric-value ${ohC}">${oh.toLocaleString()}</div><div class="metric-sub">units on hand</div></div>
    <div class="metric"><div class="metric-label">${ch.label} pacing</div><div class="metric-value ${avgP<0.5?'danger':avgP<0.75?'warn':'ok'}">${avgP>0?Math.round(avgP*100)+'%':'—'}</div><div class="metric-sub">of forecast</div></div>
    <div class="metric"><div class="metric-label">Last week (${ch.label})</div><div class="metric-value">${fmt(lastWk[tkey+'_cur'])}</div><div class="metric-sub">w/e ${lastWk.week.slice(5)}</div></div>
    <div class="metric"><div class="metric-label">MoM (${ch.label})</div><div class="metric-value ${momCol}">${mom!==null?(mom>0?'+':'')+mom+'%':'—'}</div><div class="metric-sub">vs same week −4wk</div></div>
  `;
}

function buildSvfChart(){
  const ch=getCh();
  const data=D.svf[activeProd]||[];
  const labels=data.map(d=>d.date.slice(5).replace('-','/'));
  let chDefs;
  if(ch.key==='target')    chDefs=[{k:'Target',l:'Target',c:CH_COLORS.Target}];
  else if(ch.key==='amazon')    chDefs=[{k:'Amazon',l:'Amazon',c:CH_COLORS.Amazon}];
  else if(ch.key==='tiktok_s')  chDefs=[{k:'TikTok',l:'TikTok Sales',c:CH_COLORS.TikTok}];
  else if(ch.key==='tiktok_sp') chDefs=[{k:'TikTokSamples',l:'TikTok Samples',c:CH_COLORS.TikTokSamples}];
  else if(ch.key==='walmart')   chDefs=[{k:'Walmart',l:'Walmart',c:CH_COLORS.Walmart}];
  else                          chDefs=[{k:'Ulta',l:'Ulta',c:CH_COLORS.Ulta}];
  const weeklyPacing=data.map(row=>{let s=0,f=0;chDefs.forEach(cd=>{s+=row[cd.k+'_s']||0;f+=row[cd.k+'_f']||0;});return f>0?s/f:null;});
  const datasets=[];
  chDefs.forEach(cd=>{
    datasets.push({label:cd.l+' Sales',data:data.map(r=>r[cd.k+'_s']||0),backgroundColor:cd.c,stack:cd.k,borderRadius:2});
    datasets.push({label:cd.l+' Forecast',data:data.map(r=>r[cd.k+'_f']||0),backgroundColor:cd.c+'38',stack:cd.k+'f',borderRadius:2,borderColor:cd.c,borderWidth:1});
  });
  document.getElementById('svf-legend').innerHTML=chDefs.map(cd=>`<span><span class="ld" style="background:${cd.c}"></span>${cd.l} Sales</span><span><span class="ld" style="background:${cd.c}38;border:1.5px solid ${cd.c}"></span>Forecast</span>`).join('');
  document.getElementById('svf-title').textContent=`${ch.label} — sales vs forecast, last 8 weeks`;
  const pacingPlugin={id:'pl',afterDatasetsDraw(chart){
    const {ctx,chartArea:{top},scales:{x}}=chart;ctx.save();
    weeklyPacing.forEach((p,i)=>{if(p===null)return;ctx.font='bold 10px system-ui,sans-serif';ctx.fillStyle=p>=1?'#3B6D11':'#A32D2D';ctx.textAlign='center';ctx.fillText(Math.round(p*100)+'%',x.getPixelForValue(i),top+10);});
    ctx.restore();
  }};
  if(svfChart)svfChart.destroy();
  svfChart=new Chart(document.getElementById('svfChart'),{type:'bar',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:20}},plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false}},scales:{x:{ticks:{font:{size:10},maxRotation:0}},y:{ticks:{font:{size:10},callback:v=>fmt(v)},grid:{color:'rgba(128,128,128,0.08)'}}}},plugins:[pacingPlugin]});
}

function buildTrendChart(){
  const ch=getCh();
  const rows=D.trend[activeProd]||[];
  const tkey=CH_TREND_KEY[ch.key];
  const chColor=CH_COLORS[tkey]||CH_COLORS.Target;
  const labels=rows.map(r=>r.week.slice(5).replace('-','/'));
  const momPlugin={id:'mom',afterDatasetsDraw(chart){
    const {ctx,chartArea:{top},scales:{x}}=chart;ctx.save();
    rows.forEach((r,i)=>{const m=r[tkey+'_mom'];if(m===null||m===undefined)return;ctx.font='bold 9px system-ui,sans-serif';ctx.fillStyle=m>=0?'#3B6D11':'#A32D2D';ctx.textAlign='center';ctx.fillText((m>0?'+':'')+m+'%',x.getPixelForValue(i),top+10);});
    ctx.restore();
  }};
  document.getElementById('trend-title').textContent=`${ch.label} — weekly sales vs same week last month`;
  document.getElementById('trend-legend').innerHTML=`<span><span class="ld" style="background:${chColor}"></span>${ch.label} this week</span><span><span class="ld" style="background:${chColor}55"></span>Same week last month</span>`;
  if(trendChart)trendChart.destroy();
  trendChart=new Chart(document.getElementById('trendChart'),{
    type:'bar',
    data:{labels,datasets:[{label:ch.label+' this week',data:rows.map(r=>r[tkey+'_cur']||0),backgroundColor:chColor,borderRadius:2,order:1},{label:'Same week last month',data:rows.map(r=>r[tkey+'_lm']||0),backgroundColor:chColor+'55',borderRadius:2,order:2}]},
    options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:22}},plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{label:c=>{const r=rows[c.dataIndex];const m=r[tkey+'_mom'];const suf=c.datasetIndex===0&&m!==null?' (MoM: '+(m>0?'+':'')+m+'%)':'';return c.dataset.label+': '+c.raw.toLocaleString()+suf;}}}},scales:{x:{ticks:{font:{size:10},maxRotation:0,autoSkip:true,maxTicksLimit:8}},y:{ticks:{font:{size:10},callback:v=>fmt(v)},grid:{color:'rgba(128,128,128,0.08)'}}}},
    plugins:[momPlugin]
  });
}

function buildPacing(){
  const p=D.pacing[activeProd]||{};
  const indivKeys=['Target','Amazon','TikTokSales','TikTokSamples','Walmart','Ulta'];
  const allVal=p.All||0;
  const allColor=pacingColor(allVal);
  const allH=Math.max(4,Math.min(52,Math.round((Math.min(allVal,1.5)/1.5)*52)));
  const allDisplay=allVal>0?(allVal>1.5?'>150%':Math.round(allVal*100)+'%'):'—';
  const allHtml=`<div class="pacing-item"><div class="pacing-label all-label">All</div><div class="pacing-bar-wrap"><div class="pacing-bar" style="height:${allH}px;background:${allColor};outline:1.5px solid rgba(0,0,0,0.1)"></div></div><div class="pacing-val" style="color:${allColor};font-size:12px">${allDisplay}</div></div>`;
  const divHtml=`<div class="pacing-divider"></div>`;
  const indivHtml=indivKeys.map(k=>{
    const v=p[k]||0;
    const h=Math.max(4,Math.min(52,Math.round((Math.min(v,1.5)/1.5)*52)));
    const col=pacingColor(v);
    return `<div class="pacing-item"><div class="pacing-label">${PACING_LABELS[k]}</div><div class="pacing-bar-wrap"><div class="pacing-bar" style="height:${h}px;background:${col}"></div></div><div class="pacing-val" style="color:${col}">${v>0?(v>1.5?'>150%':Math.round(v*100)+'%'):'—'}</div></div>`;
  }).join('');
  const grid=document.getElementById('pacing-grid');
  grid.style.gridTemplateColumns='1.2fr 12px repeat(6,1fr)';
  grid.style.alignItems='end';
  grid.innerHTML=allHtml+divHtml+indivHtml;
}

function buildMatrix(){
  const rows=D.fbm_matrix[activeProd]||[];
  const startOH=D.oh_apr28[activeProd]['FBM OH'];
  const starts=rows.map((r,i)=>i===0?startOH:rows[i-1].oh);
  const th='<thead><tr><th class="row-head">Row</th>'+rows.map(r=>`<th>${r.date.slice(5).replace('-','/')}</th>`).join('')+'</tr></thead>';
  // ── FIX: render actual value including negatives, colour-code only ──────────
  const startRow='<tr class="row-start"><td class="row-label">Starting FBM OH</td>'+starts.map(v=>`<td class="${ohClass(v)}">${v.toLocaleString()}</td>`).join('')+'</tr>';
  const inRow='<tr class="row-inbound"><td class="row-label">↑ Inbound</td>'+rows.map(r=>`<td>${r.inbound>0?'+'+r.inbound.toLocaleString():'—'}</td>`).join('')+'</tr>';
  const outRow='<tr class="row-outbound row-divider"><td class="row-label">↓ Outbound</td>'+rows.map(r=>`<td>${r.outbound<0?r.outbound.toLocaleString():'—'}</td>`).join('')+'</tr>';
  const endRow='<tr class="row-end"><td class="row-label">Ending FBM OH</td>'+rows.map(r=>`<td class="${ohClass(r.oh)}">${r.oh.toLocaleString()}</td>`).join('')+'</tr>';
  document.getElementById('fbm-matrix').innerHTML=th+'<tbody>'+startRow+inRow+outRow+endRow+'</tbody>';
}

function buildPOTable(){
  const pos=D.pos[activeProd]||[];
  const el=document.getElementById('po-table');
  if(!pos.length){el.innerHTML='<tbody><tr><td colspan="4" class="po-none">No confirmed POs for this SKU</td></tr></tbody>';return;}
  const th='<thead><tr><th>Date</th><th>PO #</th><th>Type</th><th>Units</th></tr></thead>';
  const rows=pos.map(p=>{
    const typeLabel=p.type==='sarantis'?'<span class="po-type-in">↑ Sarantis (Inbound)</span>':'<span class="po-type-out">↓ Target (Outbound)</span>';
    const units=p.units>0?'+'+p.units.toLocaleString():p.units.toLocaleString();
    return `<tr><td>${p.date}</td><td>${p.po}</td><td>${typeLabel}</td><td class="${p.units>0?'po-type-in':'po-type-out'}">${units}</td></tr>`;
  }).join('');
  el.innerHTML=th+'<tbody>'+rows+'</tbody>';
}

function selProd(p){activeProd=p;buildTabs();buildMetrics();buildSvfChart();buildTrendChart();buildPacing();buildMatrix();buildPOTable();}
function selCh(c){activeCh=c;buildTabs();buildMetrics();buildSvfChart();buildTrendChart();}

buildTabs();buildMetrics();
setTimeout(()=>{buildSvfChart();buildTrendChart();},50);
buildPacing();buildMatrix();buildPOTable();
</script>
